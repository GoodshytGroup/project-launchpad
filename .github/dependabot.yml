### **File 3: `recipes/mock-module-exports/src/workflow.ts`**
Path: `recipes/mock-module-exports/src/workflow.ts`
```typescript
import { promises as fs } from "fs";
import path from "path";

interface WorkflowOptions {
  inputFile: string;
  outputFile: string;
}

export async function transformModuleExports(
  options: WorkflowOptions
): Promise<void> {
  try {
    const { inputFile, outputFile } = options;
    const content = await fs.readFile(inputFile, "utf-8");
    const transformed = content
      .replace(/export\s+const\s+/g, "export const ")
      .replace(/export\s+function\s+/g, "export function ")
      .replace(/export\s+class\s+/g, "export class ")
      .replace(/export\s+default\s+/g, "export default ");
    await fs.writeFile(outputFile, transformed, "utf-8");
    console.log(`✓ Successfully transformed: ${inputFile} → ${outputFile}`);
  } catch (error) {
    console.error("✗ Transformation failed:", error);
    throw error;
  }
}

async function main(): Promise<void> {
  const inputPath = path.join(process.cwd(), "tests/basic/input.mjs");
  const outputPath = path.join(process.cwd(), "tests/basic/expected.mjs");
  await transformModuleExports({
    inputFile: inputPath,
    outputFile: outputPath,
  });
}

if (import.meta.url === `file://${process.argv[1]}`) {
  main().catch((error) => {
    console.error("Fatal error:", error);
    process.exit(1);
  });
}

export default transformModuleExports;
```

